parameters:
    app.internal_auth_token: '%env(INTERNAL_AUTH_TOKEN)%'
    app.db_dsn: '%env(SHOPPING_DATABASE_DSN)%'
    app.db_user: '%env(SHOPPING_DATABASE_USER)%'
    app.db_password: '%env(SHOPPING_DATABASE_PASSWORD)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    App\Shopping\Database:
        arguments:
            $dsn: '%app.db_dsn%'
            $user: '%app.db_user%'
            $password: '%app.db_password%'

    App\Shopping\InternalAuthSubscriber:
        arguments:
            $internalAuthToken: '%app.internal_auth_token%'

    App\Shopping\UpstreamClient:
        arguments:
            $internalAuthToken: '%app.internal_auth_token%'
            $planningBaseUri: '%env(PLANNING_BASE_URI)%'
            $catalogBaseUri: '%env(CATALOG_BASE_URI)%'
