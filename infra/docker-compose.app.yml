services:
  postgres-iam:
    image: postgres:16
    environment:
      POSTGRES_DB: iam
      POSTGRES_USER: iam
      POSTGRES_PASSWORD: iam
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iam -d iam"]
      interval: 5s
      timeout: 3s
      retries: 15
    volumes:
      - postgres-iam-data:/var/lib/postgresql/data

  postgres-catalog:
    image: postgres:16
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalog"]
      interval: 5s
      timeout: 3s
      retries: 15
    volumes:
      - postgres-catalog-data:/var/lib/postgresql/data

  postgres-planning:
    image: postgres:16
    environment:
      POSTGRES_DB: planning
      POSTGRES_USER: planning
      POSTGRES_PASSWORD: planning
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planning -d planning"]
      interval: 5s
      timeout: 3s
      retries: 15
    volumes:
      - postgres-planning-data:/var/lib/postgresql/data

  postgres-shopping:
    image: postgres:16
    environment:
      POSTGRES_DB: shopping
      POSTGRES_USER: shopping
      POSTGRES_PASSWORD: shopping
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopping -d shopping"]
      interval: 5s
      timeout: 3s
      retries: 15
    volumes:
      - postgres-shopping-data:/var/lib/postgresql/data

  redis-iam:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 15

  identity-access:
    build:
      context: ../backend/identity-access
    depends_on:
      postgres-iam:
        condition: service_healthy
      redis-iam:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/api/iam/v1/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 25
      start_period: 25s
    environment:
      APP_ENV: dev
      APP_SECRET: dev-secret
      INTERNAL_AUTH_TOKEN: dev-internal-token
      IAM_DATABASE_DSN: pgsql:host=postgres-iam;port=5432;dbname=iam
      IAM_DATABASE_USER: iam
      IAM_DATABASE_PASSWORD: iam
      IAM_REDIS_DSN: tcp://redis-iam:6379
      IAM_SESSION_TTL_SECONDS: 604800
    ports:
      - "28081:8081"

  recipe-catalog:
    build:
      context: ../backend/recipe-catalog
    depends_on:
      postgres-catalog:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8082/api/catalog/v1/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 25
      start_period: 25s
    environment:
      APP_ENV: dev
      APP_SECRET: dev-secret
      INTERNAL_AUTH_TOKEN: dev-internal-token
      CATALOG_DATABASE_DSN: pgsql:host=postgres-catalog;port=5432;dbname=catalog
      CATALOG_DATABASE_USER: catalog
      CATALOG_DATABASE_PASSWORD: catalog
    ports:
      - "8082:8082"

  recipe-import:
    build:
      context: ../backend/recipe-import
    environment:
      INTERNAL_AUTH_TOKEN: dev-internal-token
      LISTEN_ADDR: ":8083"
      # Список хостов для POST /import/url (CSV). Для MVP согласовать с business-doc; example.com — для локальных фикстур.
      IMPORT_ALLOWED_HOSTS: "127.0.0.1,localhost,example.com,www.example.com"
    ports:
      - "8083:8083"

  meal-planning:
    build:
      context: ../backend/meal-planning
    depends_on:
      postgres-planning:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8084/api/planning/v1/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 25
      start_period: 15s
    environment:
      INTERNAL_AUTH_TOKEN: dev-internal-token
      LISTEN_ADDR: ":8084"
      PLANNING_DATABASE_URL: postgres://planning:planning@postgres-planning:5432/planning?sslmode=disable
    ports:
      - "8084:8084"

  shopping-list:
    build:
      context: ../backend/shopping-list
    depends_on:
      postgres-shopping:
        condition: service_healthy
      meal-planning:
        condition: service_healthy
      recipe-catalog:
        condition: service_healthy
    environment:
      APP_ENV: dev
      APP_SECRET: dev-secret
      INTERNAL_AUTH_TOKEN: dev-internal-token
      SHOPPING_DATABASE_DSN: pgsql:host=postgres-shopping;port=5432;dbname=shopping
      SHOPPING_DATABASE_USER: shopping
      SHOPPING_DATABASE_PASSWORD: shopping
      PLANNING_BASE_URI: http://meal-planning:8084/api/planning/v1
      CATALOG_BASE_URI: http://recipe-catalog:8082/api/catalog/v1
    ports:
      - "8085:8085"

  bff-web:
    build:
      context: ../backend/bff-web
    depends_on:
      identity-access:
        condition: service_healthy
      recipe-catalog:
        condition: service_healthy
      recipe-import:
        condition: service_started
      meal-planning:
        condition: service_healthy
      shopping-list:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/bff/v1/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s
    environment:
      APP_ENV: dev
      APP_SECRET: dev-secret
      BFF_CORS_ALLOW_ORIGIN: "http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175,http://127.0.0.1:5176"
      INTERNAL_AUTH_TOKEN: dev-internal-token
      IAM_BASE_URI: http://identity-access:8081/api/iam/v1
      IMPORT_BASE_URI: http://recipe-import:8083/api/import/v1
      CATALOG_BASE_URI: http://recipe-catalog:8082/api/catalog/v1
      PLANNING_BASE_URI: http://meal-planning:8084/api/planning/v1
      SHOPPING_BASE_URI: http://shopping-list:8085/api/shopping/v1
    ports:
      - "8080:8080"

volumes:
  postgres-iam-data:
  postgres-catalog-data:
  postgres-planning-data:
  postgres-shopping-data:
