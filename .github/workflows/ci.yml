name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  openapi:
    name: OpenAPI validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate OpenAPI specs
        run: |
          set -e
          for f in contracts/openapi/*.yaml; do
            echo "Validating $f"
            npx --yes @apidevtools/swagger-cli validate "$f"
          done

  frontend:
    name: Frontend build (Vue 3 / workspaces)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  bff-web:
    name: BFF Web (Symfony PHPUnit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/bff-web
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Run test suite
        run: php bin/phpunit

  # When Go services land:
  # go-test:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-go@v5
  #       with:
  #         go-version: "1.22"
  #     - run: go test ./... -coverprofile=coverage.out -covermode=atomic
  #     - run: go tool cover -func=coverage.out | tail -1

  e2e:
    name: E2E (Playwright placeholder)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run smoke tests
        run: npm test
    # When full stack is dockerized for CI, add:
    #   services: ...
    #   run: docker compose -f infra/docker-compose.observability.yml up -d --wait
