name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  openapi:
    name: OpenAPI validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate OpenAPI specs
        run: |
          set -e
          for f in contracts/openapi/*.yaml; do
            echo "Validating $f"
            npx --yes @apidevtools/swagger-cli validate "$f"
          done

  frontend:
    name: Frontend quality gates (Vue 3 / workspaces)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:unit
      - run: npm run test:screenshots
      - run: npm run build

  bff-web:
    name: BFF Web (Symfony PHPUnit)
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      APP_SECRET: ci-secret
      DEFAULT_URI: http://localhost
      BFF_CORS_ALLOW_ORIGIN: http://localhost:5173
      INTERNAL_AUTH_TOKEN: dev-internal-token
      IAM_BASE_URI: http://localhost:8081/api/iam/v1
      IMPORT_BASE_URI: http://localhost:8083/api/import/v1
      CATALOG_BASE_URI: http://localhost:8082/api/catalog/v1
      PLANNING_BASE_URI: http://localhost:8084/api/planning/v1
      SHOPPING_BASE_URI: http://localhost:8085/api/shopping/v1
    defaults:
      run:
        working-directory: backend/bff-web
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
      - name: Prepare Symfony env file
        run: |
          if [ ! -f .env ]; then
            cp .env.dev .env
          fi
          if ! grep -q '^DEFAULT_URI=' .env; then
            echo 'DEFAULT_URI=http://localhost' >> .env
          fi
      - name: Clean Symfony cache
        run: rm -rf var/cache/*
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Run test suite
        run: php bin/phpunit

  identity-access:
    name: Identity Access (Symfony + Postgres + Redis)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/identity-access
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: iam
          POSTGRES_USER: iam
          POSTGRES_PASSWORD: iam
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U iam -d iam"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      APP_ENV: test
      APP_SECRET: ci-secret
      DEFAULT_URI: http://localhost
      INTERNAL_AUTH_TOKEN: dev-internal-token
      IAM_DATABASE_DSN: pgsql:host=127.0.0.1;port=5432;dbname=iam
      IAM_DATABASE_USER: iam
      IAM_DATABASE_PASSWORD: iam
      IAM_REDIS_DSN: tcp://127.0.0.1:6379
      IAM_SESSION_TTL_SECONDS: 604800
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
      - name: Prepare Symfony env file
        run: |
          if [ ! -f .env ]; then
            cp .env.dev .env
          fi
          if ! grep -q '^DEFAULT_URI=' .env; then
            echo 'DEFAULT_URI=http://localhost' >> .env
          fi
      - name: Clean Symfony cache
        run: rm -rf var/cache/*
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Run test suite
        run: php bin/phpunit

  recipe-catalog:
    name: Recipe catalog (Symfony + Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/recipe-catalog
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: catalog
          POSTGRES_USER: catalog
          POSTGRES_PASSWORD: catalog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U catalog -d catalog"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      APP_ENV: test
      APP_SECRET: ci-secret
      DEFAULT_URI: http://localhost
      INTERNAL_AUTH_TOKEN: dev-internal-token
      CATALOG_DATABASE_DSN: pgsql:host=127.0.0.1;port=5432;dbname=catalog
      CATALOG_DATABASE_USER: catalog
      CATALOG_DATABASE_PASSWORD: catalog
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
      - name: Prepare Symfony env file
        run: |
          if [ ! -f .env ]; then
            cp .env.dev .env
          fi
          if ! grep -q '^DEFAULT_URI=' .env; then
            echo 'DEFAULT_URI=http://localhost' >> .env
          fi
      - name: Clean Symfony cache
        run: rm -rf var/cache/*
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: php bin/phpunit

  shopping-list:
    name: Shopping list (Symfony + Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/shopping-list
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: shopping
          POSTGRES_USER: shopping
          POSTGRES_PASSWORD: shopping
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shopping -d shopping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      APP_ENV: test
      APP_SECRET: ci-secret
      DEFAULT_URI: http://localhost
      INTERNAL_AUTH_TOKEN: dev-internal-token
      SHOPPING_DATABASE_DSN: pgsql:host=127.0.0.1;port=5432;dbname=shopping
      SHOPPING_DATABASE_USER: shopping
      SHOPPING_DATABASE_PASSWORD: shopping
      PLANNING_BASE_URI: http://127.0.0.1:59999/api/planning/v1
      CATALOG_BASE_URI: http://127.0.0.1:59998/api/catalog/v1
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
      - name: Prepare Symfony env file
        run: |
          if [ ! -f .env ]; then
            cp .env.dev .env
          fi
          if ! grep -q '^DEFAULT_URI=' .env; then
            echo 'DEFAULT_URI=http://localhost' >> .env
          fi
      - name: Clean Symfony cache
        run: rm -rf var/cache/*
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: php bin/phpunit

  go-services:
    name: Go services (recipe-import, meal-planning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: recipe-import
        working-directory: backend/recipe-import
        run: go test ./...
      - name: meal-planning
        working-directory: backend/meal-planning
        run: go test ./...

  e2e:
    name: E2E (Playwright placeholder)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run smoke tests
        run: npm test
    # When full stack is dockerized for CI, add:
    #   services: ...
    #   run: docker compose -f infra/docker-compose.observability.yml up -d --wait
